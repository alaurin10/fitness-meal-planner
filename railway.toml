# Documentation of the Railway services for this monorepo.
# Railway does not consume a repo-level railway.toml for multi-service monorepos;
# you configure each service's root directory + build/start commands in the
# Railway dashboard. This file exists as a single source of truth.

# ----------------------------------------------------------------------
# Service: app-server
#   Root directory: apps/server
#   Build:   pnpm install --frozen-lockfile && pnpm --filter @platform/db generate && pnpm --filter @app/server build && pnpm --filter @platform/db migrate:deploy
#   Start:   pnpm --filter @app/server start
#   Public domain: api.app.andrewlaurin.com
#   Env: DATABASE_URL, GEMINI_API_KEY, CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY,
#        CLIENT_ORIGIN=https://app.andrewlaurin.com, NODE_ENV=production
#        (PORT is injected by Railway.)
# ----------------------------------------------------------------------

# ----------------------------------------------------------------------
# Service: app-client
#   Root directory: apps/client
#   Build:   pnpm install --frozen-lockfile && pnpm --filter @app/client build
#   Start:   pnpm --filter @app/client start
#   Public domain: app.andrewlaurin.com
#   Env: VITE_API_URL=https://api.app.andrewlaurin.com,
#        VITE_CLERK_PUBLISHABLE_KEY
# ----------------------------------------------------------------------

# ----------------------------------------------------------------------
# Service: platform-postgres (Railway-managed)
#   Single Postgres instance, database: fitness_meal_planner_db
# ----------------------------------------------------------------------
